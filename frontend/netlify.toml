[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # Set production API base for Netlify builds. You can override this in Netlify UI.
  VITE_API_BASE = "https://ai-startup-validator-production.up.railway.app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
